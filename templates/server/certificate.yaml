{{- if and .Values.server.enabled (eq .Values.internalTLS.certSource "certmanager") }}

{{- $certmanager  := .Values.internalTLS.certmanager -}}
{{- $extIssuer    := $certmanager.existingIssuer -}}
{{- $issuerKind   := "Issuer" -}}
{{- $issuerName   := (include "sgroups-chart.fullname" .) -}}

{{- if and $extIssuer.kind $extIssuer.name }}
  {{- $issuerKind   = $extIssuer.kind -}}
  {{- $issuerName   = $extIssuer.name -}}
{{- end }}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "sgroups-chart.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: server
    {{- include "sgroups-chart.labels" . | nindent 4 }}
spec:
  issuerRef:
    group: cert-manager.io
    kind: {{ $issuerKind }}
    name: {{ $issuerName }}
  dnsNames:
    - "{{ include "sgroups-chart.fullname" . }}-server"
    - "{{ include "sgroups-chart.fullname" . }}-server.{{ .Release.Namespace }}"
    - "{{ include "sgroups-chart.fullname" . }}-server.{{ .Release.Namespace }}.svc"
    {{ if $certmanager.extraDnsNames }}
    {{ range $certmanager.extraDnsNames }}
    - {{ . }}
    {{ end }}
    {{ end }}
  {{ with $certmanager.extraIPAddresses }}
  ipAddresses:
    {{ . | toYaml | nindent 4 }}
  {{ end }}
  commonName: "{{ .Release.Namespace }}-server"
  usages:
    - server auth
  subject:
    organizations:
      - hbf:workers
  secretName: {{ include "sgroups-chart.fullname" . }}-server
{{- end }}
