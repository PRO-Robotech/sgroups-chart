{{- with .Values.appSpec.applications.server }}
  {{- if .enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $.Release.Name }}-{{ .volumes.certificate.volume.name }}
  namespace: {{ $.Release.Namespace }}
spec:
  commonName: {{ $.Release.Name }}-{{ .name }}
  dnsNames:
    - {{ $.Release.Name }}-{{ .name }}
    - {{ $.Release.Name }}-{{ .name }}.{{ $.Release.Namespace }}
    - {{ $.Release.Name }}-{{ .name }}.{{ $.Release.Namespace }}.svc
    {{ if $.Values.certificates.extraDnsNames }}
    {{ range $.Values.certificates.extraDnsNames }}
    - {{ . }}
    {{ end }}
    {{ end }}
  {{ with $.Values.certificates.extraIPAddresses }}
  ipAddresses:
    {{ . | toYaml | nindent 4 }}
  {{ end }}
  issuerRef:
    {{ $.Values.certificates.issuer | toYaml | nindent 4 }}
  usages:
    - server auth
  secretName: {{ $.Release.Name }}-{{ .volumes.certificate.volume.name }}
  {{- end }}
{{- end }}
