{{- $web  := .Values.web -}}
{{- $sa       := $web.serviceAccount -}}
{{- $saName   := default (printf "%s-web" (include "sgroups-chart.fullname" .)) $sa.name -}}

{{- if and $web.enabled $sa.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  labels:
    app.kubernetes.io/component: web
    {{- include "sgroups-chart.labels" . | nindent 4 }}
  {{- with $web.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $web.serviceAccount.automount }}
{{- end }}
