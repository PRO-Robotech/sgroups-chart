{{- $expose   := .Values.expose -}}
{{- $tls      := $expose.tls -}}
{{- $istio    := $expose.istio -}}
{{- $ingress  := $expose.ingress -}}

{{- if $expose.enabled -}}
  {{ if eq $expose.resourceType "istio" }}
    {{- if $istio.gateway.enabled -}}
---
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: {{ $istio.gateway.name }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "netguard-chart.selectorLabels" . | nindent 4 }}
  {{- with $istio.gateway.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $istio.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
  {{- with $istio.gateway.istioLabelsSelector }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "{{ .Values.externalDomain }}"
    {{ if or (eq $tls.certSource "certmanager") (eq $tls.certSource "secret") }}
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "{{ .Values.externalDomain }}"
      tls:
        mode: SIMPLE
    {{ end }}
    {{ if eq $tls.certSource "certmanager" }}
        credentialName: {{ include "netguard-chart.fullname" . }}-certificate
    {{ end }}
    {{ if eq $tls.certSource "secret" }}
        credentialName: {{ $tls.secret.secretName }}
    {{ end }}
    {{- end }}

---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ include "netguard-chart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "netguard-chart.selectorLabels" . | nindent 4 }}
  {{- with $istio.virtualService.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $istio.virtualService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  hosts:
    - "{{ .Values.externalDomain }}"
  gateways:
    - {{ $istio.gateway.name }}
  http:
    - match:
        - uri:
            exact: {{ $expose.path }}
      redirect:
        {{ if or (eq $tls.certSource "certmanager") (eq $tls.certSource "secret") }}
        scheme: https
        {{ end }}
        uri: {{ $expose.path }}client

    - name: client
      match:
        - uri:
            prefix: /client
      rewrite:
        uri: /client
      route:
        - destination:
            host: {{ include "sgroups-chart.fullname" . }}-web
            port:
              number: {{ $web.service.ports.ingress }}

    - name: server
      match:
        - uri:
            prefix: /server/
      rewrite:
        uri: /
      route:
        - destination:
            host: {{ include "sgroups-chart.fullname" . }}-server
            port:
              {{- if $server.rbacproxy.enabled }}
              number: {{ .Values.server.service.ports.rbacproxy }}
              {{- else }}
              number: {{ .Values.server.service.ports.server }}
              {{- end }}
  {{ else if eq $expose.resourceType "ingress" }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "netguard-chart.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "netguard-chart.selectorLabels" . | nindent 4 }}
  {{- with $ingress.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if or $ingress.annotations (eq $ingress.ingressClassName "nginx") }}
  annotations:
    {{- if $ingress.annotations }}
    kubernetes.io/ingress.class: nginx

    {{- /* Аналог redirect scheme: https */ -}}
    {{- if or (eq $tls.certSource "certmanager") (eq $tls.certSource "secret") }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- end }}

    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($uri = "{{ $expose.path }}") {
        return 302 {{ $expose.path }}client;
      }
    {{- end }}
    {{- with $ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if $ingress.ingressClassName }}
  ingressClassName: {{ $ingress.ingressClassName }}
  {{- end }}
  {{ if or (eq $tls.certSource "certmanager") (eq $tls.certSource "secret") }}
  tls:
    - hosts:
        - "{{ .Values.externalDomain }}"
    {{ if eq $tls.certSource "certmanager" }}
      secretName: {{ include "netguard-chart.fullname" . }}-certificate
    {{ end }}
    {{ if eq $tls.certSource "secret" }}
      secretName: {{ $tls.secret.secretName }}
    {{ end }}
  {{- end }}
  rules:
    - host: "{{ .Values.externalDomain }}"
      http:
        paths:
          - path: {{ $expose.path }}client
            pathType: Prefix
            backend:
              service:
                name: {{ include "sgroups-chart.fullname" . }}-web
                port:
                  number: {{ $web.service.ports.ingress }}

          - path: {{ $expose.path }}server/
            pathType: Prefix
            backend:
              service:
                name: {{ include "sgroups-chart.fullname" . }}-server
                port:
                  {{- if $server.rbacproxy.enabled -}}
                  number: {{ .Values.server.service.ports.rbacproxy }}
                  {{- else -}}
                  number: {{ .Values.server.service.ports.server }}
                  {{- end }}
  {{- end }}
{{- end }}
