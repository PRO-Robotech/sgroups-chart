{{- $sgAPIVer := .Values.sgroupsApiVersion -}}
{{- $server   := .Values.server -}}
{{- $sa       := $server.serviceAccount -}}
{{- $saName   := default (printf "%s-server" (include "sgroups-chart.fullname" .)) $sa.name -}}

{{- if and $server.enabled $server.rbacproxy.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sgroups-chart.fullname" . }}-rbacproxy-tokenreview
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sgroups-chart.fullname" . }}-rbacproxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sgroups-chart.fullname" . }}-rbacproxy-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sgroups-chart.fullname" . }}-nonresource-system
rules:
- nonResourceURLs:
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/Sync
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/SyncStatus
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/SyncStatuses
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListNetworks
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListSecurityGroups
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListHosts
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListServices
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListSvcSvcRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListSvcFqdnRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/GetSgSubnets
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/GetSecGroupForAddress
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/GetSecGroupForHost
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindSgSgRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindFqdnRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindSgSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIECidrSgRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIESgSgRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIESgSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIECidrSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/UpdHostIPSet
  - /grpc.health.v1.Health/Check
  - /grpc.health.v1.Health/Watch
  verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sgroups-chart.fullname" . }}-nonresource-client
rules:
- nonResourceURLs:
  # - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/Sync
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/SyncStatus
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/SyncStatuses
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListNetworks
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListSecurityGroups
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListHosts
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListServices
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListSvcSvcRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/ListSvcFqdnRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/GetSgSubnets
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/GetSecGroupForAddress
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/GetSecGroupForHost
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindSgSgRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindFqdnRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindSgSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIECidrSgRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIESgSgRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIESgSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/FindIECidrSgIcmpRules
  - /hbf.{{ $sgAPIVer }}.sgroups.SecGroupService/UpdHostIPSet
  - /grpc.health.v1.Health/Check
  - /grpc.health.v1.Health/Watch
  verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sgroups-chart.fullname" . }}-nonresource-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sgroups-chart.fullname" . }}-nonresource-system
subjects:
- kind: Group
  name: "hbf:masters"
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sgroups-chart.fullname" . }}-nonresource-client
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sgroups-chart.fullname" . }}-nonresource-client
subjects:
- kind: Group
  name: "hbf:workers"
  apiGroup: rbac.authorization.k8s.io
{{- end }}
